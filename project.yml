name: HeartBit
options:
  bundleIdPrefix: com.s3m
targets:
  HeartBit:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleIdentifier: "com.s3m.HeartBit"
        CFBundleShortVersionString: "1.4.1"
        CFBundleVersion: "10"
        NSCameraUsageDescription: "HeartBit needs camera access to capture webcam photos for automation workflows."
        NSAppleEventsUsageDescription: "HeartBit needs Automation access to drive other apps (for example Notes, Calendar, Finder) for scheduled jobs you configure."
    settings:
      base:
        PRODUCT_NAME: HeartBit
        ENABLE_APP_SANDBOX: "NO"
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEAD_CODE_STRIPPING: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"

  HeartBitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: HeartBit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"

schemes:
  HeartBit:
    build:
      targets:
        HeartBit: all
        HeartBitTests: [test]
    test:
      targets:
        - HeartBitTests
